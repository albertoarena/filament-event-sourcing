name: static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    name: PHPStan and Pint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none
          # See tests.yml: pin to 2.9 to avoid Composer 2.10's advisory block on Laravel 11/12.
          tools: composer:2.9

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: composer analyse

      - name: Check formatting with Pint
        run: vendor/bin/pint --test
