name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Filament 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
          coverage: pcov
          # Every current Laravel 11 release is flagged by a security advisory, which
          # composer's insecure-package block would reject. We disable that block via
          # config.audit.block-insecure in composer.json (the 2.9 key), so pin to 2.9 to
          # keep that key honored. Revisit once the advisory range is patched upstream.
          tools: composer:2.9

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "filament/filament:^4.0" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test

  coverage:
    runs-on: ubuntu-latest
    name: Coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
          coverage: pcov
          # See the test job: pin to 2.9 so config.audit.block-insecure is honored.
          tools: composer:2.9

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Enforce coverage threshold
        run: composer test-coverage
